<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Business Research Agent</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260623-3" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <h1>Business Research</h1>
          <p>Verified public web discovery with evidence, conflicts, and dedupe.</p>
        </div>
        <form id="research-form" class="search-form">
          <input id="query" name="query" value="Cardiologists in Birmingham" autocomplete="off" />
          <input id="limit" name="limit" type="number" min="1" max="5000" value="50" title="Candidate URL limit" />
          <button type="submit">Run</button>
          <button id="download-pdf" type="button" disabled>Report</button>
        </form>
      </section>

      <section class="summary-grid" id="summary">
        <div><span>Businesses</span><strong id="businesses">0</strong></div>
        <div><span>Verified</span><strong id="verified">0</strong></div>
        <div><span>Duplicates Removed</span><strong id="duplicates">0</strong></div>
        <div><span>Duration</span><strong id="duration">-</strong></div>
      </section>

      <section class="quality-panel" aria-label="Data quality">
        <div class="quality-heading">
          <h2>Data Quality</h2>
          <button id="download-pdf-secondary" type="button" disabled>Download Report</button>
        </div>
        <div class="quality-grid">
          <div><span>With Phone</span><strong id="quality-phone">0%</strong></div>
          <div><span>With Address</span><strong id="quality-address">0%</strong></div>
          <div><span>With Website</span><strong id="quality-website">0%</strong></div>
          <div><span>With Rating</span><strong id="quality-rating">0%</strong></div>
          <div><span>With Hours</span><strong id="quality-hours">0%</strong></div>
        </div>
      </section>

      <section class="workspace">
        <aside class="event-log" id="events"></aside>
        <section class="results" id="results"></section>
      </section>
    </main>
    <script src="/static/main.js?v=20260623-3"></script>
  </body>
</html>
